name: Build & Test

on:
  push:
    paths:
      - "src/**"
      - "template/**"
  pull_request:
    paths:
      - "src/**"
      - "template/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
